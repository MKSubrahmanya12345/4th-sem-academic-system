services:
  - type: web
    name: academic-control-system-backend
    env: node
    plan: free
    root: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        fromConfig: true
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: https://academic-control-system.vercel.app
